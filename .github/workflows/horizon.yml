name: Horizon

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    name: Integration tests
    strategy:
      # Never let a new-protocol leg cancel and mask a known-good previous-protocol leg.
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        go: ["1.25", "1.26"]
        pg: [14, 16]
        protocol-version: [27, 28]
    runs-on: ${{ matrix.os }}
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      HORIZON_INTEGRATION_TESTS_ENABLED: true
      HORIZON_INTEGRATION_TESTS_CORE_MAX_SUPPORTED_PROTOCOL: ${{ matrix.protocol-version }}
      PROTOCOL_27_CORE_DOCKER_IMG: stellar/stellar-core:27.0.0-3288.7696c069d.jammy
      PROTOCOL_27_CORE_DEBIAN_PKG_VERSION: 27.0.0-3288.7696c069d.jammy~buildtests
      PROTOCOL_27_STELLAR_RPC_DOCKER_IMG: stellar/stellar-rpc:27.0.0-preview-190
      # Protocol 28 (CAP-0083) runs against the vnext (next-protocol-enabled) core build.
      PROTOCOL_28_CORE_DOCKER_IMG: stellar/unsafe-stellar-core:27.0.1-3348.ff61f2e6d.jammy-vnext
      PROTOCOL_28_CORE_DEBIAN_PKG_VERSION: 27.0.1-3348.ff61f2e6d.jammy~vnext~buildtests
      # TODO: bump to a Protocol 28 stellar-rpc image once stellar-rpc#789 publishes one.
      # Until then the P28 leg builds a stellar-rpc image from #789 source (see the
      # "Build P28 stellar-rpc image" step). Setting this var disables both that build
      # step and the in-test amber skip. Left commented so the empty-var path is exercised.
      # PROTOCOL_28_STELLAR_RPC_DOCKER_IMG: stellar/stellar-rpc:27.0.0-194
      # Pinned head of stellar-rpc#789 (fork sisuresh/stellar-rpc, base protocol-next).
      # No p28-cap-0083 branch exists on stellar/stellar-rpc; the commit is reachable
      # upstream only via refs/pull/789/head. Re-pin (and the cache key tracks it) when
      # #789 advances. Used by the P28 build step and the integration-test cache hash.
      PROTOCOL_28_STELLAR_RPC_PR_SHA: dbd841c89b0f7966659cbace2f7d1af699ebb98b
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v3
        with:
          # For pull requests, build and test the PR head not a merge of the PR with the destination.
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          # We need to full history for git-restore-mtime to know what modification dates to use.
          # Otherwise, the Go test cache will fail (due to the modification time of fixtures changing).
          fetch-depth: "0"

      # In order to debug the integration tests, run 'touch continue' once you connect to the ssh session
      #
      # - name: Setup upterm session
      #  uses: lhotari/action-upterm@d23c2722bdab893785c9fbeae314cbf080645bd7
      #  with:
      #    ## limits ssh access and adds the ssh public key for the user which triggered the workflow
      #    limit-access-to-actor: true
      #    ## limits ssh access and adds the ssh public keys of the listed GitHub users
      #    limit-access-to-users: <yourGithubUser>

      - uses: ./.github/actions/setup-go
        with:
          go-version: ${{ matrix.go }}

      - name: Pull and set Stellar Core image
        shell: bash
        run: |
          docker pull "$PROTOCOL_${{ matrix.protocol-version }}_CORE_DOCKER_IMG"
          echo HORIZON_INTEGRATION_TESTS_DOCKER_IMG="$PROTOCOL_${{ matrix.protocol-version }}_CORE_DOCKER_IMG" >> $GITHUB_ENV

      - name: Pull and set Stellar RPC image
        shell: bash
        run: |
          IMG="$PROTOCOL_${{ matrix.protocol-version }}_STELLAR_RPC_DOCKER_IMG"
          if [ -n "$IMG" ]; then
            docker pull "$IMG"
          else
            echo "::warning::No prebuilt stellar-rpc image for protocol ${{ matrix.protocol-version }}; will build from source if available (see next step)."
          fi
          echo "HORIZON_INTEGRATION_TESTS_STELLAR_RPC_DOCKER_IMG=$IMG" >> "$GITHUB_ENV"

      - name: Build P28 stellar-rpc image from stellar-rpc#789
        if: matrix.protocol-version == '28' && env.HORIZON_INTEGRATION_TESTS_STELLAR_RPC_DOCKER_IMG == ''
        shell: bash
        env:
          # Single source of truth lives in the job-level env block above.
          RPC_PR_SHA: ${{ env.PROTOCOL_28_STELLAR_RPC_PR_SHA }}
        run: |
          git init -q /tmp/stellar-rpc
          # Prefer the exact SHA (reproducible); fall back to the PR head ref.
          git -C /tmp/stellar-rpc fetch --depth 1 https://github.com/stellar/stellar-rpc.git "$RPC_PR_SHA" \
            || git -C /tmp/stellar-rpc fetch --depth 1 https://github.com/stellar/stellar-rpc.git refs/pull/789/head
          git -C /tmp/stellar-rpc checkout -q FETCH_HEAD
          GOT="$(git -C /tmp/stellar-rpc rev-parse HEAD)"
          if [ "$GOT" != "$RPC_PR_SHA" ]; then
            echo "::error::stellar-rpc#789 head moved (expected $RPC_PR_SHA, got $GOT); re-pin PROTOCOL_28_STELLAR_RPC_PR_SHA and the cache hash."
            exit 1
          fi
          docker build --pull --platform linux/amd64 \
            -f /tmp/stellar-rpc/cmd/stellar-rpc/docker/Dockerfile \
            --build-arg STELLAR_CORE_VERSION="$PROTOCOL_28_CORE_DEBIAN_PKG_VERSION" \
            -t stellar/stellar-rpc:p28-local /tmp/stellar-rpc
          echo "HORIZON_INTEGRATION_TESTS_STELLAR_RPC_DOCKER_IMG=stellar/stellar-rpc:p28-local" >> "$GITHUB_ENV"

      - name: Install core
        run: |
          sudo wget -qO - https://apt.stellar.org/SDF.asc | APT_KEY_DONT_WARN_ON_DANGEROUS_USAGE=true sudo apt-key add -
          sudo bash -c 'echo "deb https://apt.stellar.org noble unstable" > /etc/apt/sources.list.d/SDF-unstable.list'
          # The 27.0.0 core build is only published for jammy, so add the jammy unstable repo as well,
          # plus the LLVM-20 jammy repo for its libc++1/libc++abi1/libunwind runtime dependencies.
          sudo bash -c 'echo "deb https://apt.stellar.org jammy unstable" >> /etc/apt/sources.list.d/SDF-unstable.list'
          sudo wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key | APT_KEY_DONT_WARN_ON_DANGEROUS_USAGE=true sudo apt-key add -
          sudo bash -c 'echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-20 main" > /etc/apt/sources.list.d/llvm-jammy.list'
          sudo apt-get update && sudo apt-get install -y stellar-core="$PROTOCOL_${{ matrix.protocol-version }}_CORE_DEBIAN_PKG_VERSION"
          echo "Using stellar core version $(stellar-core version)"
          echo 'HORIZON_INTEGRATION_TESTS_CAPTIVE_CORE_BIN=/usr/bin/stellar-core' >> $GITHUB_ENV

      - name: Build Horizon reproducible build
        run: |
          go build -v -trimpath -buildvcs=false .
          touch empty

      - name: Calculate the source hash
        id: calculate_source_hash
        run: |
          combined_hash=$(echo "horizon-hash-${{ hashFiles('./') }}-${{ hashFiles('./docker/**') }}-${{ hashFiles('./internal/**') }}-protocol-${{ matrix.protocol-version }}-${{ env.PROTOCOL_28_CORE_DOCKER_IMG }}-${{ env.PROTOCOL_28_STELLAR_RPC_PR_SHA }}-${{ env.PROTOCOL_28_CORE_DEBIAN_PKG_VERSION }}-${{ env.PROTOCOL_27_CORE_DOCKER_IMG }}-${{ env.PREFIX }}" | sha256sum | cut -d ' ' -f 1)
          echo "COMBINED_SOURCE_HASH=$combined_hash" >> "$GITHUB_ENV"

      - name: Restore Horizon binary and integration tests source hash to cache
        id: horizon_binary_tests_hash
        uses: actions/cache/restore@v4
        with:
          path: ./empty
          lookup-only: true
          key: ${{ env.COMBINED_SOURCE_HASH }}

      - if: ${{ steps.horizon_binary_tests_hash.outputs.cache-hit != 'true' }}
        run: go test -race -timeout 75m -v ./internal/integration/...

      - name: Save Horizon binary and integration tests source hash to cache
        if: ${{ success() && steps.horizon_binary_tests_hash.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ./empty
          key: ${{ env.COMBINED_SOURCE_HASH }}

  verify-range:
    name: Test (and push) verify-range image
    runs-on: ubuntu-24.04
    env:
      GO_VERSION: 1.25.0
      STELLAR_CORE_VERSION: 27.0.0-3288.7696c069d.noble
    steps:
      - uses: actions/checkout@v3
        with:
          # For pull requests, build and test the PR head not a merge of the PR with the destination.
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Build and test the Verify Range Docker image
        run: |
          docker build --build-arg="GO_VERSION=$GO_VERSION" --build-arg="STELLAR_CORE_VERSION=$STELLAR_CORE_VERSION" -f docker/verify-range/Dockerfile -t stellar/horizon-verify-range docker/verify-range/
          # Any range should do for basic testing, this range was chosen pretty early in history so that it only takes a few mins to run
          docker run -e BRANCH=$(git rev-parse HEAD) -e FROM=10000063 -e TO=10000127 stellar/horizon-verify-range

      # Push image
      - if: github.ref == 'refs/heads/main'
        name: Login to DockerHub
        uses: docker/login-action@bb984efc561711aaa26e433c32c3521176eae55b
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - if: github.ref == 'refs/heads/main'
        name: Push to DockerHub
        run: docker push stellar/horizon-verify-range:latest
